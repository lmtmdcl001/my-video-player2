<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaman IPTV Ultimate Pro</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#111827,#0b1220);
color:white;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
background:linear-gradient(90deg,#22c55e,#06b6d4,#a855f7);
}

/* TOP SEARCH */
.topbar{
padding:10px;
background:#0b1220;
}

.topbar input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

/* PLAYER TOP */
.player-area{
padding:10px;
}

.player{
background:black;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 20px #22c55e;
position:relative;
}

video{width:100%;}

.loader{
position:absolute;
top:50%;
left:50%;
width:40px;
height:40px;
border:4px solid #444;
border-top:4px solid #22c55e;
border-radius:50%;
transform:translate(-50%,-50%);
animation:spin 1s linear infinite;
}

.hidden{display:none;}

@keyframes spin{
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* LAYOUT */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:280px;
background:#0b1220;
height:100vh;
overflow:auto;
padding:10px;
border-right:2px solid #22c55e;
}

.cat{
padding:10px;
margin:5px 0;
background:#1f2937;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.cat:hover{background:#22c55e;}

/* CHANNEL */
.channel{
padding:12px;
margin:6px 0;
background:linear-gradient(135deg,#1e293b,#334155);
border-radius:10px;
cursor:pointer;
text-align:center;
}

.channel:hover{
background:linear-gradient(135deg,#22c55e,#06b6d4);
}

/* MAIN */
.main{
flex:1;
padding:15px;
}

/* CONTROLS */
.controls{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

select,button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

button{
background:linear-gradient(90deg,#22c55e,#06b6d4);
color:white;
font-weight:bold;
}

/* STATUS */
.status{
margin-top:10px;
color:#22c55e;
font-weight:bold;
}

/* FOOTER */
.footer{
margin-top:20px;
padding:20px;
text-align:center;
background:#0b1220;
border-top:2px solid #22c55e;
}

.footer h3{
color:#22c55e;
margin-bottom:10px;
}

.footer a{
color:#06b6d4;
display:block;
margin:5px 0;
text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.container{flex-direction:column;}
.sidebar{
width:100%;
height:auto;
}
}
</style>
</head>

<body>

<div class="header">📺 Zaman IPTV Ultimate Pro Engine</div>

<!-- SEARCH -->
<div class="topbar">
<input id="search" placeholder="Search channels...">
</div>

<!-- PLAYER TOP -->
<div class="player-area">
<div class="player">
<div id="loader" class="loader hidden"></div>
<video id="video" controls autoplay></video>
</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="cat" onclick="setCat('sports')">🏆 Sports (12)</div>
<div class="cat" onclick="setCat('all')">📺 All</div>

<div id="list"></div>

</div>

<!-- MAIN -->
<div class="main">

<div class="status" id="status">Ready</div>

<div class="controls">

<select id="qualitySelect">
<option value="-1">Auto</option>
<option value="360">360p</option>
<option value="480">480p</option>
<option value="720">720p</option>
<option value="1080">1080p</option>
</select>

<button onclick="toggleAutoQuality()">Auto Mode</button>
<button onclick="openFullscreen()">Fullscreen</button>

</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">

<h3>Developer Contact</h3>

<a href="https://t.me/incomesz">📱 Telegram: @incomesz</a>
<a href="https://www.facebook.com/zamanr00">🌐 Facebook Profile</a>

<p>📍 Rangpur, Bangladesh</p>
<p>© 2026 Zaman IPTV. All Rights Reserved.</p>

</div>

<script>

const channels=[
{name:"tofee",cat:"sports",url:"https://sm-monirul.top/tof/live/toffee4/index.m3u8"},
{name:"No Buffer 2",cat:"sports",url:"https://edge22.776740.ir.cdn.ir/hls2/sport.m3u8"},
{name:"Sports 3",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8"},
{name:"Sports 4",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/31/index.m3u8"},
{name:"Sports 5",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8"},
{name:"Sports 6",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/30/index.m3u8"},
{name:"Sports 7",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/33/index.m3u8"},
{name:"Sports 8",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8"},
{name:"Sports 9",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/107/index.m3u8"},
{name:"Sports 10",cat:"sports",url:"https://wa.newzela.online/tooota1_720/index.m3u8"},
{name:"Sports 11",cat:"sports",url:"https://tahmidx.dotreddigital.workers.dev"},
{name:"Sports 12",cat:"sports",url:"https://tahmidx-tsn.dotreddigital.workers.dev"}
];

let cat="sports";
let hls=null;
let autoQuality=true;

const list=document.getElementById("list");
const video=document.getElementById("video");
const loader=document.getElementById("loader");
const search=document.getElementById("search");
const status=document.getElementById("status");
const qualitySelect=document.getElementById("qualitySelect");

function setCat(c){
cat=c;
render();
}

function render(){
list.innerHTML="";
channels
.filter(c=>cat==="all"||c.cat===cat)
.filter(c=>c.name.toLowerCase().includes(search.value.toLowerCase()))
.forEach(c=>{
const div=document.createElement("div");
div.className="channel";
div.innerText=c.name;
div.onclick=()=>play(c.url);
list.appendChild(div);
});
}

/* PLAY */
function play(url){
if(!url) return;

loader.classList.remove("hidden");
status.innerText="Loading...";

if(hls) hls.destroy();

hls=new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:120,
maxBufferLength:60,
startLevel:-1
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
loader.classList.add("hidden");
status.innerText="🟢 LIVE";
video.play();
});
}

/* QUALITY */
qualitySelect.addEventListener("change",function(){
if(!hls) return;
let v=parseInt(this.value);
if(v===-1){hls.currentLevel=-1;return;}
for(let i=0;i<hls.levels.length;i++){
if(hls.levels[i].height>=v){
hls.currentLevel=i;
break;
}
}
});

/* AUTO */
function toggleAutoQuality(){
autoQuality=!autoQuality;
status.innerText=autoQuality?"Auto ON":"Auto OFF";
}

/* FULLSCREEN */
function openFullscreen(){
if(video.requestFullscreen) video.requestFullscreen();
else if(video.webkitRequestFullscreen) video.webkitRequestFullscreen();
}

/* SEARCH */
search.oninput=render;

/* INIT */
render();

</script>

</body>
</html>
