<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.header {
    padding:10px;
    text-align:center;
    background:#1c1c1c;
    font-size:18px;
}

.container {
    display:flex;
    height:90vh;
}

.sidebar {
    width:35%;
    overflow-y:auto;
    background:#181818;
}

.channel {
    padding:10px;
    border-bottom:1px solid #2c2c2c;
    cursor:pointer;
}

.channel:hover {
    background:#333;
}

.player {
    width:65%;
    display:flex;
    justify-content:center;
    align-items:center;
}

video {
    width:95%;
    max-height:85vh;
    background:black;
}
.small {
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="header">🔥 My IPTV Player</div>

<div class="container">

<div class="sidebar" id="list"></div>

<div class="player">
<video id="video" controls autoplay></video>
</div>

</div>

<script>

const video = document.getElementById("video");
const list = document.getElementById("list");

// ▶ PLAY FUNCTION
function play(url){
    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// ▶ PRELOADED CHANNELS (YOUR 2 LINKS)
const channels = [
    {
        name: "Somoy TV",
        url: "https://live.thebosstv.com:30443/dwlive/Somoy-TV/playlist.m3u8"
    },
    {
        name: "NBCSN Live",
        url: "https://storage.googleapis.com/xredsox/nbcsn/manifest.m3u8"
    }
];

// ▶ RENDER LIST
function render(){
    list.innerHTML = "";

    channels.forEach(ch => {

        let div = document.createElement("div");
        div.className = "channel";

        div.innerHTML = `
            <div>${ch.name}</div>
            <div class="small">${ch.url}</div>
        `;

        div.onclick = () => play(ch.url);

        list.appendChild(div);
    });
}

render();

// ▶ AUTO PLAY FIRST CHANNEL
play(channels[0].url);

</script>

</body>
</html>
