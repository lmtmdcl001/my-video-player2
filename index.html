<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaman IPTV Pro Final</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#111827,#0b1220);
color:white;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#22c55e,#06b6d4,#a855f7);
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* TOPBAR */
.topbar{
padding:10px;
background:#0b1220;
display:flex;
gap:10px;
}

.topbar input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
outline:none;
}

/* LAYOUT */
.container{display:flex;flex-wrap:wrap;}

.sidebar{
width:280px;
height:100vh;
overflow:auto;
background:#0b1220;
border-right:2px solid #22c55e;
padding:10px;
}

.cat{
padding:8px;
margin:5px 0;
background:#1f2937;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.cat:hover{background:#22c55e;}

.channel{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin:6px 0;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#1e293b,#334155);
transition:.3s;
}

.channel:hover{
transform:scale(1.03);
background:linear-gradient(90deg,#22c55e,#06b6d4);
}

.star{color:#facc15;cursor:pointer;}

/* PLAYER */
.main{flex:1;padding:15px;}

.player{
background:black;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 0 25px #22c55e;
}

video{width:100%;}

.loader{
position:absolute;
top:50%;
left:50%;
width:50px;
height:50px;
border:5px solid #444;
border-top:5px solid #22c55e;
border-radius:50%;
transform:translate(-50%,-50%);
animation:spin 1s linear infinite;
}

.hidden{display:none;}

@keyframes spin{
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* CONTROLS */
.controls{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

select,button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

button{
background:linear-gradient(90deg,#22c55e,#06b6d4);
color:white;
font-weight:bold;
}

/* FOOTER */
.footer{
margin-top:20px;
padding:20px;
text-align:center;
background:#0b1220;
border-top:2px solid #22c55e;
}

.footer a{
color:#22c55e;
margin:0 10px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">📺 Zaman IPTV Pro Final Engine</div>

<div class="topbar">
<input id="search" placeholder="Search channels...">
</div>

<div class="container">

<div class="sidebar">

<div class="cat" onclick="setCat('all')">All</div>
<div class="cat" onclick="setCat('sports')">Sports</div>

<div id="list"></div>

</div>

<div class="main">

<div class="player">
<div id="loader" class="loader hidden"></div>
<video id="video" controls autoplay></video>
</div>

<div class="controls">

<!-- QUALITY -->
<select id="qualitySelect">
<option value="-1">Auto</option>
<option value="360">360p</option>
<option value="480">480p</option>
<option value="720">720p</option>
<option value="1080">1080p</option>
</select>

<button onclick="openFullscreen()">Fullscreen</button>

</div>

<div id="status" style="margin-top:10px;color:#22c55e;">Ready</div>

</div>

</div>

<footer class="footer">
<p>Zaman IPTV Pro Final</p>
<a href="https://t.me/incomesz">Telegram</a>
<a href="https://facebook.com/zamanr00">Facebook</a>
</footer>

<script>

/* ================= CHANNELS (SPORTS 10) ================= */

const channels = [

{name:"Sports 1",cat:"sports",url:"https://sofascore.live/api/premium-stream?url=https%3A%2F%2Fd1211whpimeups.cloudfront.net%2Fsmil%3Artbgo%2Fchunklist_b2196000_sleng.m3u8&root=https%3A%2F%2Fd1211whpimeups.cloudfront.net%2Fsmil%3Artbgo%2Fchunklist.m3u8&sig=ddec1d1b7da2e2eb93c3fab8e115f5b91a2bf29fc17aae6e25ccd38b58faeba9"},
{name:"Sports 2",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/26/index.m3u8"},
{name:"Sports 3",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8"},
{name:"Sports 4",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/31/index.m3u8"},
{name:"Sports 5",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8"},
{name:"Sports 6",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/30/index.m3u8"},
{name:"Sports 7",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/33/index.m3u8"},
{name:"Sports 8",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8"},
{name:"Sports 9",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/107/index.m3u8"},
{name:"Sports 10",cat:"sports",url:"https://1nyaler.streamhostingcdn.top/stream/108/index.m3u8"}

];

let cat="all";
let hls=null;

const list=document.getElementById("list");
const video=document.getElementById("video");
const loader=document.getElementById("loader");
const search=document.getElementById("search");
const status=document.getElementById("status");
const qualitySelect=document.getElementById("qualitySelect");

/* ================= RENDER ================= */

function setCat(c){
cat=c;
render();
}

function render(){
list.innerHTML="";

channels
.filter(c=>cat==="all"||c.cat===cat)
.filter(c=>c.name.toLowerCase().includes(search.value.toLowerCase()))
.forEach(c=>{

const div=document.createElement("div");
div.className="channel";
div.innerHTML=`<span>${c.name}</span>`;

div.onclick=()=>play(c.url);

list.appendChild(div);
});

}

/* ================= PLAYER (OPTIMIZED) ================= */

function play(url){

if(!url) return;

loader.classList.remove("hidden");
status.innerText="Loading...";

if(hls) hls.destroy();

hls=new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:90,
maxBufferLength:30,
maxMaxBufferLength:60,
liveSyncDurationCount:3,
liveMaxLatencyDurationCount:10,
fragLoadingTimeOut:20000,
manifestLoadingTimeOut:10000,
levelLoadingTimeOut:10000,
startLevel:-1
});

hls.loadSource(url);
hls.attachMedia(video);

/* READY */
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
loader.classList.add("hidden");
status.innerText="🟢 LIVE";
video.play();
});

/* ERROR RECOVERY */
hls.on(Hls.Events.ERROR,(e,d)=>{

if(d.fatal){

if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
status.innerText="🔄 Network retry...";
hls.startLoad();
}

else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
status.innerText="⚠️ Recovering stream...";
hls.recoverMediaError();
}

else{
status.innerText="❌ Stream failed";
hls.destroy();
}

}

});

}

/* ================= QUALITY ================= */

qualitySelect.addEventListener("change",function(){

if(!hls) return;

let selected=parseInt(this.value);

if(selected===-1){
hls.currentLevel=-1;
return;
}

for(let i=0;i<hls.levels.length;i++){
if(hls.levels[i].height>=selected){
hls.currentLevel=i;
break;
}
}

});

/* ================= FULLSCREEN ================= */

function openFullscreen(){

if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitRequestFullscreen){
video.webkitRequestFullscreen();
}
else if(video.webkitEnterFullscreen){
video.webkitEnterFullscreen();
}

}

/* SEARCH */
search.oninput=render;

/* INIT */
render();

</script>

</body>
</html>
