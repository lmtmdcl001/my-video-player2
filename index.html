<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zamans IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f172a;
font-family:Arial,sans-serif;
color:white;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
}

.sidebar{
width:280px;
background:#1e293b;
min-height:100vh;
padding:10px;
}

.channel{
padding:12px;
margin-bottom:8px;
background:#334155;
border-radius:8px;
cursor:pointer;
}

.channel:hover{
background:#475569;
}

.main{
flex:1;
padding:15px;
}

.player-wrapper{
position:relative;
background:black;
border-radius:12px;
overflow:hidden;
}

video{
width:100%;
display:block;
background:black;
}

.loader{
position:absolute;
top:50%;
left:50%;
width:60px;
height:60px;
margin-left:-30px;
margin-top:-30px;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
z-index:10;
}

.hidden{
display:none;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.controls{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

select,button{
padding:10px;
border:none;
border-radius:8px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.status{
margin-top:10px;
color:#22c55e;
}

@media(max-width:768px){
.sidebar{
width:100%;
min-height:auto;
}
}
</style>
</head>
<body>

<div class="header">📺 Zamans IPTV</div>

<div class="container">

<div class="sidebar">

<div class="channel"
onclick="playChannel(channels[0].url)">
Go Live HD 
</div>

<div class="channel"
onclick="playChannel(channels[1].url)">
Channel 2
</div>

<div class="channel"
onclick="playChannel(channels[2].url)">
Channel 3
</div>

</div>

<div class="main">

<div class="player-wrapper">

<div id="loader" class="loader"></div>

<video id="video"
controls
autoplay
playsinline>
</video>

</div>

<div class="controls">

<select id="qualitySelect">
<option>Auto</option>
</select>

<button onclick="openFullscreen()">
Fullscreen
</button>

</div>

<div id="status" class="status">
Connecting...
</div>

</div>

</div>

<script>

const channels = [

{
name:"Go Live HD",
url:"https://sofascore.live/api/premium-stream?url=https%3A%2F%2Fd1211whpimeups.cloudfront.net%2Fsmil%3Artbgo%2Fchunklist_b2196000_sleng.m3u8&root=https%3A%2F%2Fd1211whpimeups.cloudfront.net%2Fsmil%3Artbgo%2Fchunklist.m3u8&sig=ddec1d1b7da2e2eb93c3fab8e115f5b91a2bf29fc17aae6e25ccd38b58faeba9"
},

{
name:"BEIN Arabic ",
url:"https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8"
},

{
name:"Channel 3",
url:"PASTE_THIRD_CHANNEL_HERE"
}

];

const video = document.getElementById("video");
const loader = document.getElementById("loader");
const status = document.getElementById("status");
const qualitySelect = document.getElementById("qualitySelect");

let hls;

function showLoader(){
loader.classList.remove("hidden");
}

function hideLoader(){
loader.classList.add("hidden");
}

function playChannel(url){

showLoader();

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls = new Hls();

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

hideLoader();

status.innerHTML="🟢 LIVE";

qualitySelect.innerHTML =
'<option value="-1">Auto</option>';

hls.levels.forEach((level,index)=>{

const option =
document.createElement("option");

option.value=index;

option.text=
level.height
? level.height+"p"
: "Level "+index;

qualitySelect.appendChild(option);

});

video.play().catch(()=>{});

});

hls.on(Hls.Events.ERROR,function(){

hideLoader();

status.innerHTML=
"🔴 Stream unavailable";

});

}

}

qualitySelect.addEventListener("change",function(){

if(!hls) return;

hls.currentLevel =
parseInt(this.value);

});

function openFullscreen(){

if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitRequestFullscreen){
video.webkitRequestFullscreen();
}

}

playChannel(channels[0].url);

</script>

</body>
</html>
