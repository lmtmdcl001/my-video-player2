<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zamans IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0f17;
  color:white;
  font-family:Arial,sans-serif;
}

.header{
  position:sticky;
  top:0;
  z-index:100;
  background:#111827;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2937;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.search{
  width:300px;
  max-width:50%;
}

.search input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
}

.hero{
  padding:20px;
}

.player-wrapper{
  position:relative;
  background:black;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,0,0,.5);
}

video{
  width:100%;
  display:block;
  background:black;
}

.loader{
  position:absolute;
  top:50%;
  left:50%;
  width:60px;
  height:60px;
  margin-left:-30px;
  margin-top:-30px;
  border:6px solid rgba(255,255,255,.2);
  border-top:6px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.hidden{
  display:none;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.controls{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button,select{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button{
  background:#22c55e;
  color:white;
}

.status{
  margin-top:10px;
  color:#22c55e;
}

.section-title{
  padding:20px 20px 10px;
  font-size:22px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:0 20px 30px;
}

.card{
  background:#111827;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.03);
}

.poster{
  height:120px;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.card-title{
  padding:12px;
}

@media(max-width:768px){
  .header{
    flex-direction:column;
    gap:10px;
  }

  .search{
    width:100%;
    max-width:100%;
  }

  .poster{
    height:90px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📺 Zamans IPTV</div>

  <div class="search">
    <input type="text" id="searchInput" placeholder="Search channels...">
  </div>
</div>

<div class="hero">

  <div class="player-wrapper">

    <div id="loader" class="loader hidden"></div>

    <video id="video" controls autoplay playsinline></video>

  </div>

  <div class="controls">
    <select id="qualitySelect">
      <option value="-1">Auto Quality</option>
    </select>

    <button onclick="openFullscreen()">Fullscreen</button>
  </div>

  <div id="status" class="status">
    Select a channel
  </div>

</div>

<div class="section-title">
  Live Channels
</div>

<div id="channelGrid" class="grid"></div>

<script>

const channels = [
  {
    name:"Sample Channel 1",
    url:"YOUR_STREAM_URL_1"
  },
  {
    name:"Sample Channel 2",
    url:"YOUR_STREAM_URL_2"
  },
  {
    name:"Sample Channel 3",
    url:"YOUR_STREAM_URL_3"
  }
];

const video = document.getElementById("video");
const loader = document.getElementById("loader");
const status = document.getElementById("status");
const grid = document.getElementById("channelGrid");
const searchInput = document.getElementById("searchInput");
const qualitySelect = document.getElementById("qualitySelect");

let hls;

function renderChannels(list){

  grid.innerHTML = "";

  list.forEach(channel=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="poster">📺</div>
      <div class="card-title">${channel.name}</div>
    `;

    card.onclick = ()=>playChannel(channel.url);

    grid.appendChild(card);

  });

}

function playChannel(url){

  loader.classList.remove("hidden");
  status.innerHTML = "Connecting...";

  if(hls){
    hls.destroy();
  }

  if(Hls.isSupported()){

    hls = new Hls();

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{

      loader.classList.add("hidden");

      qualitySelect.innerHTML =
      '<option value="-1">Auto Quality</option>';

      hls.levels.forEach((level,index)=>{

        const option = document.createElement("option");

        option.value = index;

        option.text =
          level.height
          ? level.height + "p"
          : "Level " + index;

        qualitySelect.appendChild(option);

      });

      status.innerHTML = "🟢 LIVE";

      video.play().catch(()=>{});

    });

    hls.on(Hls.Events.ERROR, ()=>{

      loader.classList.add("hidden");
      status.innerHTML = "🔴 Stream unavailable";

    });

  }

}

qualitySelect.addEventListener("change",function(){

  if(hls){
    hls.currentLevel = parseInt(this.value);
  }

});

function openFullscreen(){

  if(video.requestFullscreen){
    video.requestFullscreen();
  }else if(video.webkitRequestFullscreen){
    video.webkitRequestFullscreen();
  }

}

searchInput.addEventListener("input",()=>{

  const keyword =
    searchInput.value.toLowerCase();

  const filtered =
    channels.filter(c =>
      c.name.toLowerCase().includes(keyword)
    );

  renderChannels(filtered);

});

renderChannels(channels);

</script>

</body>
</html>
