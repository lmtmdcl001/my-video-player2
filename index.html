<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zamans IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f172a;
font-family:Arial,sans-serif;
color:white;
}

.header{
background:#111827;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
}

.sidebar{
width:280px;
background:#1e293b;
min-height:100vh;
padding:10px;
overflow-y:auto;
}

.channel{
padding:12px;
margin-bottom:8px;
background:#334155;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.channel:hover{
background:#475569;
}

.main{
flex:1;
padding:15px;
}

.player-wrapper{
position:relative;
background:black;
border-radius:12px;
overflow:hidden;
}

video{
width:100%;
display:block;
background:black;
}

.loader{
position:absolute;
top:50%;
left:50%;
width:60px;
height:60px;
margin-left:-30px;
margin-top:-30px;
border:6px solid rgba(255,255,255,.2);
border-top:6px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
z-index:10;
}

.hidden{
display:none;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.controls{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

select,button{
padding:10px;
border:none;
border-radius:8px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.status{
margin-top:10px;
color:#22c55e;
font-weight:bold;
}

@media(max-width:768px){
.sidebar{
width:100%;
min-height:auto;
}
}
</style>
</head>
<body>

<div class="header">📺 Zamans IPTV</div>

<div class="container">

<div class="sidebar" id="channelList"></div>

<div class="main">

<div class="player-wrapper">

<div id="loader" class="loader hidden"></div>

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

<div class="controls">

<select id="qualitySelect">
<option value="-1">Auto</option>
</select>

<button onclick="openFullscreen()">
Fullscreen
</button>

</div>

<div id="status" class="status">
Ready
</div>

</div>

</div>

<script>

const channels = [

{
name:"Go Live HD",
url:"https://sofascore.live/api/premium-stream?url=https%3A%2F%2Fd1211whpimeups.cloudfront.net%2Fsmil%3Artbgo%2Fchunklist_b2196000_sleng.m3u8&root=https%3A%2F%2Fd1211whpimeups.cloudfront.net%2Fsmil%3Artbgo%2Fchunklist.m3u8&sig=ddec1d1b7da2e2eb93c3fab8e115f5b91a2bf29fc17aae6e25ccd38b58faeba9"
},

{
name:"Channel 26",
url:"https://1nyaler.streamhostingcdn.top/stream/26/index.m3u8"
},

{
name:"BEIN Arabic",
url:"https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8"
},

{
name:"Channel 31",
url:"https://1nyaler.streamhostingcdn.top/stream/31/index.m3u8"
},

{
name:"Channel 32",
url:"https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8"
},

{
name:"Channel 30",
url:"https://1nyaler.streamhostingcdn.top/stream/30/index.m3u8"
},

{
name:"Channel 33",
url:"https://1nyaler.streamhostingcdn.top/stream/33/index.m3u8"
},

{
name:"Channel 106",
url:"https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8"
},

{
name:"Channel 107",
url:"https://1nyaler.streamhostingcdn.top/stream/107/index.m3u8"
},

{
name:"Channel 108",
url:"https://1nyaler.streamhostingcdn.top/stream/108/index.m3u8"
},

{
name:"FIFA Plus",
url:"https://a62dad94.wurl.com/manifest/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/bf2e2c08-6355-4c5a-8d38-e6f4470a558d/0.m3u8"
}

];

const video = document.getElementById("video");
const loader = document.getElementById("loader");
const status = document.getElementById("status");
const qualitySelect = document.getElementById("qualitySelect");
const channelList = document.getElementById("channelList");

let hls = null;

function showLoader(){
loader.classList.remove("hidden");
}

function hideLoader(){
loader.classList.add("hidden");
}

channels.forEach(channel=>{

const div=document.createElement("div");

div.className="channel";
div.textContent=channel.name;

div.onclick=()=>{
playChannel(channel.url);
};

channelList.appendChild(div);

});

function playChannel(url){

showLoader();

status.innerHTML="Connecting...";

if(hls){
hls.destroy();
hls=null;
}

qualitySelect.innerHTML =
'<option value="-1">Auto</option>';

if(Hls.isSupported()){

hls=new Hls();

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

hideLoader();

status.innerHTML="🟢 LIVE";

hls.levels.forEach((level,index)=>{

const option=document.createElement("option");

option.value=index;

option.text=
level.height
? level.height+"p"
: "Level "+index;

qualitySelect.appendChild(option);

});

video.play().catch(()=>{});

});

hls.on(Hls.Events.ERROR,()=>{

hideLoader();

status.innerHTML=
"🔴 Stream unavailable";

});

}
else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=url;

video.addEventListener('loadedmetadata',()=>{

hideLoader();

status.innerHTML="🟢 LIVE";

video.play();

});

}
}

qualitySelect.addEventListener("change",function(){

if(hls){
hls.currentLevel=parseInt(this.value);
}

});

function openFullscreen(){

if(video.requestFullscreen){
video.requestFullscreen();
}
else if(video.webkitRequestFullscreen){
video.webkitRequestFullscreen();
}
else if(video.webkitEnterFullscreen){
video.webkitEnterFullscreen();
}

}

playChannel(channels[0].url);

</script>

</body>
</html>
